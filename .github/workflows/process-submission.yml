name: Process Project or Resource Submission

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  process-submission:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[Submission]') || startsWith(github.event.issue.title, '[Resource]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install js-yaml

      - name: Parse Issue and Update Datasets
        run: node .github/scripts/process_issue.js
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Debug Git Status
        run: |
          echo "Checking git status..."
          git status
          echo "Attempting to add files..."
          git add -A
          echo "Status after add:"
          git status

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Process submission from issue #${{ github.event.issue.number }}"
          title: "New Submission: ${{ github.event.issue.title }}"
          body: "Automated PR from issue #${{ github.event.issue.number }}."
          branch: "submission-${{ github.event.issue.number }}"
